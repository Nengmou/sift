[build]
builder = "dockerfile"

[[services]]
name = "web"

[services.deploy]
startCommand = "uvicorn api.main:app --host 0.0.0.0 --port $PORT"
healthcheckPath = "/livez"
healthcheckTimeout = 30

[[services]]
name = "migrate"

[services.deploy]
startCommand = "alembic upgrade head"

[[services]]
name = "ingest"

[services.deploy]
startCommand = "python -m scripts.ingest"
cronSchedule = "0 */2 * * *"

[[services]]
name = "score"

[services.deploy]
startCommand = "python -m scripts.score"
cronSchedule = "30 */2 * * *"

[[services]]
name = "deliver"

[services.deploy]
startCommand = "python -m scripts.deliver"
cronSchedule = "*/15 * * * *"
