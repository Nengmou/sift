{% extends "base.html" %}
{% block title %}Settings — Sift{% endblock %}
{% block content %}
<main>
  <h2>Settings</h2>
  <form method="post" action="/settings" style="margin-top: 1rem;">
    <label for="delivery_time">Daily briefing time (UTC)
      <input type="time" id="delivery_time" name="delivery_time" value="{{ user.delivery_time or '08:00' }}" />
    </label>
    <button type="submit">Save</button>
  </form>
</main>
{% endblock %}
