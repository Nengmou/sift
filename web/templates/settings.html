{% extends "base.html" %}
{% block title %}Settings — Sift{% endblock %}
{% block content %}
<div class="page">
  <header class="site-header">
    <span class="logo">Sift</span>
    <nav>
      <a href="/feed">Feed</a>
    </nav>
  </header>

  <h1>Settings</h1>
  <form method="post" action="/settings">

    <h2>Daily briefing time (UTC)</h2>
    <input type="time" id="delivery_time" name="delivery_time"
           value="{{ user.delivery_time or '08:00' }}" />

    <h2>Interests</h2>
    <div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(190px,1fr));gap:0.5rem;margin-bottom:0.5rem;">
      {% for topic in topic_cards %}
      <label style="display:flex;gap:0.5rem;align-items:center;cursor:pointer;font-size:0.875rem;color:var(--text-secondary);">
        <input type="checkbox" name="interests" value="{{ topic }}"
               {% if topic in user.interests %}checked{% endif %} />
        <span>{{ topic }}</span>
      </label>
      {% endfor %}
    </div>

    <button type="submit" style="margin-top:1rem;">Save settings</button>
  </form>
</div>
{% endblock %}
